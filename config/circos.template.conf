karyotype = __KARYOTYPE__
# The chromosomes_unit value is used as a unit (suffix "u") to shorten
# values in other parts of the configuration file. Some parameters,
# such as ideogram and tick spacing, accept "u" suffixes, so instead of
# spacing = 10000000
# you can write
# spacing = 10u
# See ticks.conf for examples.
chromosomes_units = 10000000
chromosomes_display_default = Yes
# If no:
#chromosomes                 = /chr[1-22]$/
#chromosomes                 = chr2;chr18
#chromosomes_scale   = chr2=0.5r,/chr[1819]$/=0.5r
#chromosomes_reverse = /chr1[234]/
#chromosomes_radius  = chr2:0.9r,chr19:0.9r

<ideogram>
    <spacing>
    default = 0.005r
    </spacing>
# Ideogram position, fill and outline
radius           = 0.90r
thickness        = 20p
fill             = yes
stroke_color     = dgrey
stroke_thickness = 2p
# Minimum definition for ideogram labels.
show_label       = yes
# see etc/fonts.conf for list of font names
label_font       = default 
label_radius     = dims(image,radius) - 60p
label_size       = 30
label_parallel   = yes
show_bands = yes
fill_bands = yes
band_transparency = 2
band_stroke_color = black
</ideogram>

show_ticks          = yes
show_tick_labels    = yes
<ticks>
radius           = 1r
color            = black
thickness        = 2p
# the tick label is derived by multiplying the tick position
# by 'multiplier' and casting it in 'format':
# sprintf(format,position*multiplier)
multiplier       = 1e-6
# %d   - integer
# %f   - float
# %.1f - float with one decimal
# %.2f - float with two decimals
# for other formats, see https://perldoc.perl.org/functions/sprintf.html
format           = %d
    <tick>
    spacing        = 5u
    size           = 10p
    </tick>
    <tick>
    spacing        = 25u
    size           = 15p
    show_label     = yes
    label_size     = 20p
    label_offset   = 10p
    format         = %d
    </tick>
</ticks>

